<title>昭和純喫茶めぐり手帖</title>
<style>
  :root{
    --brown-dark:#4a2c1c;
    --brown:#6b3f2a;
    --brown-light:#a9754a;
    --cream:#f6ecd9;
    --cream-deep:#eddcbb;
    --mustard:#d9a441;
    --red:#b8412f;
    --red-deep:#8f2f21;
    --green:#4f7a5c;
    --green-deep:#355443;
    --ink:#332018;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","游明朝体","Yu Mincho","YuMincho",serif;
    min-height:100vh;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    background:var(--cream);
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
  }
  /* ---- shared ---- */
  .header-bar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 16px;
    background:var(--brown-dark);
    color:var(--cream);
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:3px solid var(--mustard);
  }
  .header-bar h1{
    font-size:1.05rem;
    margin:0;
    letter-spacing:.05em;
    flex:1;
  }
  .back-btn{
    background:none;
    border:1px solid var(--mustard);
    color:var(--cream);
    border-radius:20px;
    padding:5px 12px;
    font-size:.85rem;
    cursor:pointer;
    font-family:inherit;
  }
  .back-btn:hover{background:rgba(255,255,255,0.1);}
  main{flex:1; padding-bottom:40px;}
  button{cursor:pointer;}
  .btn-primary{
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:12px 18px;
    font-size:1rem;
    font-family:inherit;
    letter-spacing:.05em;
    box-shadow:0 3px 0 var(--red-deep);
  }
  .btn-primary:active{transform:translateY(2px); box-shadow:0 1px 0 var(--red-deep);}
  .btn-secondary{
    background:var(--cream-deep);
    color:var(--brown-dark);
    border:1px solid var(--brown-light);
    border-radius:6px;
    padding:10px 16px;
    font-family:inherit;
    font-size:.95rem;
  }
  .btn-danger{
    background:none;
    border:1px solid #a33;
    color:#a33;
    border-radius:6px;
    padding:6px 10px;
    font-size:.8rem;
    font-family:inherit;
  }
  label{display:block; font-size:.85rem; color:var(--brown); margin:14px 0 4px;}
  input[type=text],input[type=date],textarea{
    width:100%;
    padding:10px;
    border:1px solid var(--brown-light);
    border-radius:6px;
    background:#fffdf8;
    font-family:inherit;
    font-size:1rem;
    color:var(--ink);
  }
  textarea{resize:vertical; min-height:80px;}
  .form-wrap{padding:16px;}
  .chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;}
  .chip{
    border:1.5px solid var(--brown-light);
    background:#fffdf8;
    border-radius:20px;
    padding:7px 12px;
    font-size:.9rem;
    font-family:inherit;
  }
  .chip.selected{
    background:var(--mustard);
    border-color:var(--mustard);
    color:var(--brown-dark);
    font-weight:bold;
  }
  .menu-tag-list{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
  .menu-tag{
    background:var(--cream-deep);
    border:1px solid var(--brown-light);
    border-radius:16px;
    padding:4px 10px;
    font-size:.85rem;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .menu-tag button{background:none;border:none;color:var(--red-deep);font-size:.9rem;padding:0;}

  /* ---- cover ---- */
  .cover{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:32px 20px 48px;
    background:
      repeating-linear-gradient(45deg, rgba(107,63,42,0.05) 0 12px, transparent 12px 24px),
      linear-gradient(180deg, var(--cream) 0%, var(--cream-deep) 100%);
  }
  .cover-photo{
    width:100%;
    max-width:420px;
    aspect-ratio:4/3;
    object-fit:cover;
    border-radius:6px;
    border:2px solid var(--brown);
    box-shadow:0 6px 18px rgba(74,44,28,0.35);
  }
  .cover h1{
    font-size:1.9rem;
    color:var(--brown-dark);
    margin:18px 0 4px;
    letter-spacing:.08em;
    text-shadow:1px 1px 0 var(--mustard);
  }
  .cover .sub{
    color:var(--brown);
    font-size:.95rem;
    letter-spacing:.15em;
    margin-bottom:26px;
  }
  .cover-frame{
    border:2px solid var(--brown);
    outline:1px solid var(--mustard);
    outline-offset:4px;
    padding:20px;
    border-radius:4px;
    background:rgba(255,253,248,0.55);
  }
  .start-btn{
    margin-top:28px;
    background:var(--brown-dark);
    color:var(--cream);
    border:none;
    padding:14px 34px;
    font-size:1.05rem;
    border-radius:30px;
    letter-spacing:.1em;
    font-family:inherit;
    box-shadow:0 4px 0 var(--brown);
  }
  .start-btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--brown);}

  /* ---- list ---- */
  .shop-card{
    display:flex;
    gap:12px;
    background:#fffdf8;
    margin:12px 16px;
    padding:12px;
    border-radius:8px;
    border:1px solid var(--cream-deep);
    box-shadow:0 2px 6px rgba(74,44,28,0.08);
    align-items:center;
    cursor:pointer;
  }
  .shop-card:hover{border-color:var(--mustard);}
  .shop-icon{
    width:56px;height:56px;flex-shrink:0;
    background:var(--brown-dark);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:1.5rem;
  }
  .shop-card-info{flex:1; text-align:left;}
  .shop-card-info .name{font-size:1.05rem; color:var(--brown-dark); font-weight:bold;}
  .shop-card-info .area{font-size:.8rem; color:var(--brown-light);}
  .shop-card-info .visits{font-size:.78rem; color:var(--red); margin-top:2px;}
  .empty-state{
    text-align:center;
    padding:60px 24px;
    color:var(--brown);
  }
  .fab{
    position:fixed;
    right:calc(50% - 260px + 20px);
    bottom:24px;
    width:56px;height:56px;
    border-radius:50%;
    background:var(--red);
    color:#fff;
    border:none;
    font-size:1.8rem;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    z-index:20;
  }
  @media (max-width:560px){
    .fab{right:20px;}
  }

  /* ---- detail ---- */
  .detail-hero{
    background:var(--brown-dark);
    color:var(--cream);
    padding:22px 18px 18px;
    border-bottom:4px solid var(--mustard);
  }
  .detail-hero .name{font-size:1.3rem; margin:0 0 4px;}
  .detail-hero .addr{font-size:.85rem; color:var(--cream-deep); opacity:.85;}
  .action-row{display:flex; gap:10px; padding:14px 16px 4px; flex-wrap:wrap;}
  .maps-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#1a73e8;
    color:#fff;
    text-decoration:none;
    padding:10px 16px;
    border-radius:6px;
    font-size:.9rem;
  }
  .section{padding:14px 16px;}
  .section h2{
    font-size:.95rem;
    color:var(--brown);
    border-bottom:2px solid var(--mustard);
    display:inline-block;
    padding-bottom:2px;
    margin-bottom:10px;
  }
  .menu-list{list-style:none; padding:0; margin:0;}
  .menu-list li{
    padding:8px 10px;
    background:#fffdf8;
    border:1px solid var(--cream-deep);
    border-left:4px solid var(--mustard);
    border-radius:4px;
    margin-bottom:6px;
    font-size:.95rem;
  }
  .visit-card{
    background:#fffdf8;
    border:1px solid var(--cream-deep);
    border-radius:8px;
    padding:12px;
    margin-bottom:12px;
    position:relative;
  }
  .visit-card .date{font-size:.85rem; color:var(--brown); font-weight:bold;}
  .visit-card .mood{
    display:inline-block;
    background:var(--cream-deep);
    border-radius:14px;
    padding:2px 10px;
    font-size:.85rem;
    margin-left:8px;
  }
  .visit-card .companions{font-size:.82rem; color:var(--brown-light); margin-top:4px;}
  .visit-card .memo{margin-top:8px; font-size:.92rem; line-height:1.6; white-space:pre-wrap;}
  .visit-card img{width:100%; border-radius:6px; margin-top:8px;}
  .visit-card .del-visit{position:absolute; top:10px; right:10px;}
  .sample-tag{
    display:inline-block;
    background:var(--mustard);
    color:var(--brown-dark);
    font-size:.7rem;
    padding:1px 8px;
    border-radius:10px;
    margin-left:8px;
    vertical-align:middle;
  }
  .shop-manage-row{display:flex; gap:8px; padding:0 16px 8px;}
  .file-input-wrap{margin-top:6px;}
</style>

  function renderList(){
    var shops = data.shops.slice().sort(function(a,b){ return (b.createdAt||0) - (a.createdAt||0); });
    var html = '<div class="header-bar">' +
      '<button class="back-btn" id="toCover">表紙</button>' +
      '<h1>高松 純喫茶リスト</h1>' +
    '</div><main>';

    if(shops.length === 0){
      html += '<div class="empty-state">まだお店が登録されていません。<br>右下の＋から最初の一軒を登録しましょう。</div>';
    } else {
      shops.forEach(function(s){
        var visitCount = s.visits.length;
        var last = visitCount ? s.visits.slice().sort(function(a,b){return a.date<b.date?1:-1;})[0].date : null;
        html += '<div class="shop-card" data-id="'+esc(s.id)+'">' +
          '<div class="shop-icon">🍮</div>' +
          '<div class="shop-card-info">' +
            '<div class="name">'+esc(s.name)+(s.isSample?'<span class="sample-tag">サンプル</span>':'')+'</div>' +
            '<div class="area">'+esc(s.area||"")+'</div>' +
            '<div class="visits">'+(visitCount ? '訪問 '+visitCount+'回・最終 '+esc(last) : 'まだ未訪問')+'</div>' +
          '</div>' +
        '</div>';
      });
    }
    html += '</main><button class="fab" id="addShopFab">＋</button>';
    app.innerHTML = html;

    document.getElementById("toCover").onclick = function(){ location.hash = "#/"; };
    document.getElementById("addShopFab").onclick = function(){ location.hash = "#/add-shop"; };
    Array.prototype.forEach.call(document.querySelectorAll(".shop-card"), function(el){
      el.onclick = function(){ location.hash = "#/shop/"+el.getAttribute("data-id"); };
    });
  }

  function renderAddShop(editId){
    var editing = editId ? getShop(editId) : null;
    var menuItems = editing ? editing.recommendedMenu.slice() : [];

    var html = '<div class="header-bar">' +
      '<button class="back-btn" id="backBtn">戻る</button>' +
      '<h1>'+(editing ? "お店を編集":"お店を登録")+'</h1>' +
    '</div><main><div class="form-wrap">' +
      '<label>店名</label>' +
      '<input type="text" id="fName" placeholder="例）喫茶 ○○軒" value="'+(editing?esc(editing.name):'')+'">' +
      '<label>エリア</label>' +
      '<input type="text" id="fArea" value="'+(editing?esc(editing.area):'高松市')+'">' +
      '<label>住所（Googleマップの検索・道順に使用）</label>' +
      '<input type="text" id="fAddress" placeholder="例）香川県高松市○○町1-2-3" value="'+(editing?esc(editing.address):'')+'">' +
      '<label>おすすめメニュー</label>' +
      '<div style="display:flex; gap:8px;">' +
        '<input type="text" id="fMenuInput" placeholder="例）ナポリタン">' +
        '<button class="btn-secondary" id="fMenuAdd" type="button">追加</button>' +
      '</div>' +
      '<div class="menu-tag-list" id="menuTagList"></div>' +
      '<div style="margin-top:26px; display:flex; gap:10px;">' +
        '<button class="btn-primary" id="saveShopBtn">保存する</button>' +
      '</div>' +
    '</div></main>';
    app.innerHTML = html;

    function renderMenuTags(){
      var el = document.getElementById("menuTagList");
      el.innerHTML = menuItems.map(function(m,i){
        return '<span class="menu-tag">'+esc(m)+'<button data-i="'+i+'" type="button">✕</button></span>';
      }).join("");
      Array.prototype.forEach.call(el.querySelectorAll("button"), function(b){
        b.onclick = function(){
          menuItems.splice(parseInt(b.getAttribute("data-i"),10),1);
          renderMenuTags();
        };
      });
    }
    renderMenuTags();

    document.getElementById("backBtn").onclick = function(){ history.back(); };
    document.getElementById("fMenuAdd").onclick = function(){
      var v = document.getElementById("fMenuInput").value.trim();
      if(v){
        menuItems.push(v);
        document.getElementById("fMenuInput").value = "";
        renderMenuTags();
      }
    };
    document.getElementById("fMenuInput").addEventListener("keydown", function(e){
      if(e.key === "Enter"){ e.preventDefault(); document.getElementById("fMenuAdd").click(); }
    });

    document.getElementById("saveShopBtn").onclick = function(){
      var name = document.getElementById("fName").value.trim();
      var address = document.getElementById("fAddress").value.trim();
      var area = document.getElementById("fArea").value.trim();
      if(!name || !address){
        alert("店名と住所を入力してください。");
        return;
      }
      if(editing){
        editing.name = name;
        editing.address = address;
        editing.area = area;
        editing.recommendedMenu = menuItems;
        editing.isSample = false;
      } else {
        data.shops.push({
          id: uid(),
          name: name,
          address: address,
          area: area,
          recommendedMenu: menuItems,
          createdAt: Date.now(),
          visits: []
        });
      }
      saveData();
      location.hash = editing ? "#/shop/"+editing.id : "#/list";
    };
  }

  function renderShopDetail(id){
    var shop = getShop(id);
    if(!shop){ location.hash = "#/list"; return; }

    var visits = shop.visits.slice().sort(function(a,b){ return a.date < b.date ? 1 : -1; });

    var html = '<div class="header-bar">' +
      '<button class="back-btn" id="backBtn">戻る</button>' +
      '<h1>お店の記録</h1>' +
    '</div>' +
    '<div class="detail-hero">' +
      '<div class="name">'+esc(shop.name)+(shop.isSample?'<span class="sample-tag">サンプル</span>':'')+'</div>' +
      '<div class="addr">'+esc(shop.address)+'</div>' +
    '</div>' +
    '<div class="action-row">' +
      '<a class="maps-btn" href="'+mapsUrl(shop.address)+'" target="_blank" rel="noopener">📍 現在地からGoogleマップで道順</a>' +
    '</div>' +
    '<div class="shop-manage-row">' +
      '<button class="btn-secondary" id="editShopBtn">お店情報を編集</button>' +
      '<button class="btn-danger" id="delShopBtn">削除</button>' +
    '</div>' +
    '<div class="section">' +
      '<h2>おすすめメニュー</h2>' +
      (shop.recommendedMenu.length
        ? '<ul class="menu-list">'+shop.recommendedMenu.map(function(m){return '<li>'+esc(m)+'</li>';}).join("")+'</ul>'
        : '<div style="color:var(--brown-light); font-size:.9rem;">未登録です。編集から追加できます。</div>') +
    '</div>' +
    '<div class="section">' +
      '<h2>訪問の記録</h2>' +
      '<button class="btn-primary" id="addVisitBtn" style="margin-bottom:14px;">＋ この日の記録を追加</button>' +
      (visits.length ? visits.map(function(v){
        return '<div class="visit-card" data-vid="'+esc(v.id)+'">' +
          '<button class="btn-danger del-visit" data-vid="'+esc(v.id)+'">削除</button>' +
          '<div class="date">'+esc(v.date)+'<span class="mood">'+(v.mood?esc(v.mood.emoji)+' '+esc(v.mood.label):'')+'</span></div>' +
          (v.companions ? '<div class="companions">一緒に：'+esc(v.companions)+'</div>' : '') +
          (v.memo ? '<div class="memo">'+esc(v.memo)+'</div>' : '') +
          (v.photo ? '<img src="'+v.photo+'">' : '') +
        '</div>';
      }).join("") : '<div style="color:var(--brown-light); font-size:.9rem;">まだ記録がありません。</div>') +
    '</div>';

    app.innerHTML = html;

    document.getElementById("backBtn").onclick = function(){ location.hash = "#/list"; };
    document.getElementById("editShopBtn").onclick = function(){ location.hash = "#/edit-shop/"+shop.id; };
    document.getElementById("addVisitBtn").onclick = function(){ location.hash = "#/shop/"+shop.id+"/add-visit"; };
    document.getElementById("delShopBtn").onclick = function(){
      if(confirm("「"+shop.name+"」を削除しますか？記録もすべて消えます。")){
        data.shops = data.shops.filter(function(s){ return s.id !== shop.id; });
        saveData();
        location.hash = "#/list";
      }
    };
    Array.prototype.forEach.call(document.querySelectorAll(".del-visit"), function(btn){
      btn.onclick = function(e){
        e.stopPropagation();
        var vid = btn.getAttribute("data-vid");
        if(confirm("この記録を削除しますか？")){
          shop.visits = shop.visits.filter(function(v){ return v.id !== vid; });
          saveData();
          renderShopDetail(shop.id);
        }
      };
    });
  }

  function renderAddVisit(shopId){
    var shop = getShop(shopId);
    if(!shop){ location.hash = "#/list"; return; }

    var selectedMood = null;
    var photoData = null;
    var today = new Date().toISOString().slice(0,10);

    var html = '<div class="header-bar">' +
      '<button class="back-btn" id="backBtn">戻る</button>' +
      '<h1>'+esc(shop.name)+' の記録</h1>' +
    '</div><main><div class="form-wrap">' +
      '<label>訪れた日</label>' +
      '<input type="date" id="vDate" value="'+today+'">' +
      '<label>誰と行った？</label>' +
      '<input type="text" id="vCompanions" placeholder="例）友人、ひとりで、家族">' +
      '<label>その時の気分</label>' +
      '<div class="chip-row" id="moodRow">' +
        MOODS.map(function(m,i){
          return '<button type="button" class="chip" data-i="'+i+'">'+m.emoji+' '+m.label+'</button>';
        }).join("") +
      '</div>' +
      '<label>思い出・メモ</label>' +
      '<textarea id="vMemo" placeholder="味の感想、店内の雰囲気、話したことなど"></textarea>' +
      '<label>写真（任意）</label>' +
      '<div class="file-input-wrap"><input type="file" accept="image/*" id="vPhoto"></div>' +
      '<div style="margin-top:26px;">' +
        '<button class="btn-primary" id="saveVisitBtn">記録を保存する</button>' +
      '</div>' +
    '</div></main>';
    app.innerHTML = html;

    document.getElementById("backBtn").onclick = function(){ location.hash = "#/shop/"+shop.id; };

    Array.prototype.forEach.call(document.querySelectorAll("#moodRow .chip"), function(btn){
      btn.onclick = function(){
        Array.prototype.forEach.call(document.querySelectorAll("#moodRow .chip"), function(b){ b.classList.remove("selected"); });
        btn.classList.add("selected");
        selectedMood = MOODS[parseInt(btn.getAttribute("data-i"),10)];
      };
    });

    document.getElementById("vPhoto").addEventListener("change", function(e){
      var file = e.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(ev){
        var img = new Image();
        img.onload = function(){
          var maxW = 800;
          var scale = Math.min(1, maxW / img.width);
          var canvas = document.createElement("canvas");
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          photoData = canvas.toDataURL("image/jpeg", 0.7);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("saveVisitBtn").onclick = function(){
      var dateVal = document.getElementById("vDate").value || today;
      var companions = document.getElementById("vCompanions").value.trim();
      var memo = document.getElementById("vMemo").value.trim();
      shop.visits.push({
        id: uid(),
        date: dateVal,
        companions: companions,
        mood: selectedMood,
        memo: memo,
        photo: photoData
      });
      saveData();
      location.hash = "#/shop/"+shop.id;
    };
  }

  window.addEventListener("hashchange", render);
  render();
})();
</script>
</body>
</html>
